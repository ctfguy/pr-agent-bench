name: advisory-miner-local

services:
  advisory-temporal-db:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5543:5432"
    volumes:
      - advisory_temporal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  advisory-temporal:
    image: temporalio/auto-setup:1.22.4
    depends_on:
      advisory-temporal-db:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: advisory-temporal-db
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "advisory-temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  advisory-temporal-ui:
    image: temporalio/ui:2.23.0
    depends_on:
      advisory-temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: advisory-temporal:7233
      TEMPORAL_CSRF_COOKIE_INSECURE: "true"
    ports:
      - "8088:8080"

  advisory-app-db:
    image: postgres:16
    environment:
      POSTGRES_USER: advisory
      POSTGRES_PASSWORD: advisory
      POSTGRES_DB: advisory_miner
    ports:
      - "5545:5432"
    volumes:
      - advisory_app_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisory -d advisory_miner"]
      interval: 5s
      timeout: 5s
      retries: 10

  advisory-langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    ports:
      - "5544:5432"
    volumes:
      - advisory_langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  advisory-langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - advisory_langfuse_clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  advisory-langfuse-redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "advisory-redis"]
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "advisory-redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  advisory-langfuse-minio:
    image: minio/minio:latest
    entrypoint: ["sh", "-c"]
    command: ['mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data']
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9092:9000"
      - "9093:9001"
    volumes:
      - advisory_langfuse_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  advisory-langfuse-web:
    image: langfuse/langfuse:3
    depends_on:
      advisory-langfuse-db:
        condition: service_healthy
      advisory-langfuse-clickhouse:
        condition: service_healthy
      advisory-langfuse-redis:
        condition: service_healthy
      advisory-langfuse-minio:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment: &advisory-langfuse-env
      DATABASE_URL: postgresql://langfuse:langfuse@advisory-langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3100
      NEXTAUTH_SECRET: advisory-local-nextauth-secret
      SALT: advisory-local-salt
      ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      CLICKHOUSE_MIGRATION_URL: clickhouse://advisory-langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://advisory-langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://advisory-langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9092
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: advisory-langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: advisory-redis
      REDIS_TLS_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: advisory-local-org
      LANGFUSE_INIT_ORG_NAME: Advisory Miner Local
      LANGFUSE_INIT_PROJECT_ID: advisory-miner-dev
      LANGFUSE_INIT_PROJECT_NAME: advisory-miner-dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-advisory-local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-advisory-local
      LANGFUSE_INIT_USER_EMAIL: admin@localhost.dev
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: password

  advisory-langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      advisory-langfuse-db:
        condition: service_healthy
      advisory-langfuse-clickhouse:
        condition: service_healthy
      advisory-langfuse-redis:
        condition: service_healthy
      advisory-langfuse-minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:3033:3030"
    environment:
      <<: *advisory-langfuse-env

  advisory-worker:
    build:
      context: .
    image: advisory-miner:local
    depends_on:
      advisory-temporal:
        condition: service_healthy
      advisory-app-db:
        condition: service_healthy
      advisory-langfuse-web:
        condition: service_started
      advisory-langfuse-worker:
        condition: service_started
    environment: &advisory-app-env
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_VALIDATOR_MODEL: ${OPENAI_VALIDATOR_MODEL:-gpt-5-mini}
      AGENT_WORKERS: ${AGENT_WORKERS:-5}
      REPO_CACHE_DIR: /app/.cache/repos
      ADVISORY_MINER_DATABASE_URL: postgresql://advisory:advisory@advisory-app-db:5432/advisory_miner
      TEMPORAL_ADDRESS: advisory-temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: advisory-miner
      LANGFUSE_PUBLIC_KEY: pk-lf-advisory-local
      LANGFUSE_SECRET_KEY: sk-lf-advisory-local
      LANGFUSE_BASE_URL: http://advisory-langfuse-web:3000
    volumes:
      - advisory_repo_cache:/app/.cache/repos
      - ./results:/app/results
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["advisory-miner", "temporal-worker", "--address", "advisory-temporal:7233", "--namespace", "default", "--task-queue", "advisory-miner"]

  advisory-submit:
    image: advisory-miner:local
    depends_on:
      advisory-worker:
        condition: service_started
      advisory-app-db:
        condition: service_healthy
    environment:
      <<: *advisory-app-env
    volumes:
      - advisory_repo_cache:/app/.cache/repos
      - ./results:/app/results
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        advisory-miner db-init &&
        advisory-miner temporal-submit
        --address advisory-temporal:7233
        --namespace default
        --task-queue advisory-miner
        $${ADVISORY:+--advisory "$$ADVISORY"}
        $${URL:+--url "$$URL"}
        $${LIMIT:+--limit "$$LIMIT"}
        $${SEVERITY:+--severity "$$SEVERITY"}

volumes:
  advisory_app_db:
  advisory_temporal_db:
  advisory_langfuse_db:
  advisory_langfuse_clickhouse:
  advisory_langfuse_minio:
  advisory_repo_cache:
